<!DOCTYPE html>
<html lang='es'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1.0'>
<title>Bingo Online Pro</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#1e1b4b,#7c3aed,#ec4899);color:#fff;min-height:100vh}
.wrap{max-width:1100px;margin:auto;padding:24px}.hero{text-align:center}.hero h1{font-size:52px;margin:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}.card{background:rgba(255,255,255,.12);backdrop-filter:blur(10px);padding:20px;border-radius:24px;box-shadow:0 20px 40px rgba(0,0,0,.25)}
input,button{padding:12px 16px;border:none;border-radius:14px;font-size:16px}input{width:100%;margin-bottom:12px}button{cursor:pointer;font-weight:700}
.primary{background:#facc15}.success{background:#22c55e;color:#fff}.danger{background:#ef4444;color:#fff}
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.cell{height:58px;background:#fff;color:#111;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:700}.hit{background:#fde047;box-shadow:0 0 18px #fde047;animation:pulse 1s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}} .balls{display:flex;flex-wrap:wrap;gap:8px}.ball{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.18)} .big{font-size:64px;font-weight:900;text-align:center;color:#fde047}
@media(max-width:800px){.grid{grid-template-columns:1fr}.hero h1{font-size:36px}}
</style>
</head>
<body>
<div class='wrap'>
<div class='hero'><h1>🎉 Bingo Online PRO</h1><p>100% funcional para GitHub Pages</p></div>
<div class='grid'>
<div class='card'>
<h2>👑 Administrador</h2>
<button class='primary' onclick='draw()'>🎲 Sortear Número</button>
<button class='danger' onclick='resetGame()'>Reiniciar</button>
<div class='big' id='last'>-</div>
<div class='balls' id='history'></div>
</div>
<div class='card'>
<h2>🎮 Jugador</h2>
<input id='code' placeholder='Código del jugador'>
<button class='success' onclick='join()'>Ingresar</button>
<div class='board' id='board'></div>
<button class='primary' style='margin-top:14px' onclick='claim()'>🎉 Reclamar BINGO</button>
<h3>Números Cantados</h3><div class='balls' id='called'></div>
<div id='winner'></div>
</div>
</div></div>
<script>
let drawn=[]; let board=[];
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function unique75(n){const s=new Set();while(s.size<n)s.add(rand(1,75));return [...s]}
function join(){board=unique75(25);renderBoard();}
function renderBoard(){document.getElementById('board').innerHTML=board.map(n=>`<div class='cell ${drawn.includes(n)?'hit':''}' id='c${n}'>${n}</div>`).join('')}
function draw(){const left=[];for(let i=1;i<=75;i++)if(!drawn.includes(i))left.push(i); if(!left.length)return; const n=left[rand(0,left.length-1)]; drawn.push(n); localStorage.setItem('drawn',JSON.stringify(drawn)); sync(); const a=new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg'); a.play().catch(()=>{});} 
function sync(){document.getElementById('last').textContent=drawn[drawn.length-1]||'-';document.getElementById('history').innerHTML=drawn.map(n=>`<span class='ball'>${n}</span>`).join('');document.getElementById('called').innerHTML=drawn.map(n=>`<span class='ball'>${n}</span>`).join('');renderBoard();}
function resetGame(){drawn=[];localStorage.removeItem('drawn');sync();document.getElementById('winner').innerHTML='';}
function claim(){document.getElementById('winner').innerHTML='<h2>🏆 ¡BINGO RECLAMADO!</h2>'}
window.addEventListener('storage',()=>{drawn=JSON.parse(localStorage.getItem('drawn')||'[]');sync();});
drawn=JSON.parse(localStorage.getItem('drawn')||'[]'); join(); sync();
</script>
</body>
</html>
